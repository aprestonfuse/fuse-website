<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fuse A&E — Architecture & Engineering for Mission-Critical Defense Facilities</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* =========================
   VARIABLES & RESET
========================= */
:root {
  --ink:#0f1822;
  --ink-2:#1f2933;
  --steel:#3b4a5c;
  --steel-2:#6b7a8f;
  --line:#e4e7ec;
  --bg:#ffffff;
  --bg-alt:#f4f6f8;
  --accent:#1c4ed8;
  --accent-dk:#133a9f;
  --gold:#b8945b;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  color:var(--ink);
  background:var(--bg);
  line-height:1.65;
}
.container{max-width:1240px;margin:0 auto;padding:0 32px}

/* =========================
   TOP BAR
========================= */
.topbar{
  background:var(--ink);
  color:#c8d0db;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
}
.topbar .container{
  display:flex;
  justify-content:space-between;
  padding:10px 32px;
}
.topbar strong{color:var(--gold)}

/* =========================
   HEADER
========================= */
.header{
  position:sticky;
  top:0;
  background:rgba(255,255,255,.97);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  z-index:100;
}
.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}
.brand img{height:58px}
.nav{display:flex;gap:32px}
.nav a{
  color:var(--ink-2);
  text-decoration:none;
  font-weight:500;
  font-size:14.5px;
}
.nav .btn{
  background:var(--accent);
  color:#fff;
  padding:11px 22px;
  border-radius:2px;
  font-weight:600;
}

/* =========================
   HERO
========================= */
.hero{
  min-height:88vh;
  display:flex;
  align-items:center;
  background:
    linear-gradient(115deg,rgba(15,24,34,.92),rgba(15,24,34,.35)),
    url('https://images.unsplash.com/photo-1487958449943-2429e8be8625?auto=format&fit=crop&w=2000&q=80');
  background-size:cover;
  color:#fff;
}
.hero-content{max-width:880px}
.hero .eyebrow{
  color:var(--gold);
